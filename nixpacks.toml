# ============================================================
# nixpacks.toml — Railway deployment config
# Fix: libxcb + OpenCV pada Python 3.11
# ============================================================

[phases.setup]
nixPkgs = [
  "python311",
  "libxcb",
  "xorg.libXext",
  "xorg.libX11",
  "xorg.libXrender",
  "glib",
  "libGL",
]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "gunicorn app:app --workers 1 --timeout 120 --bind 0.0.0.0:$PORT"
